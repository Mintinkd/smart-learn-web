name = "smart-learn-backend"
main = "src/index.ts"
compatibility_date = "2024-05-29"

[assets]
directory = "../frontend/dist"
not_found_handling = "single-page-application"
binding = "ASSETS"


[[d1_databases]]
binding = "DB"
database_name = "smart_learn_db"
database_id = "7f490d6d-cbeb-4d44-a3ac-5d2621fec1cf"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "91407e3a79bf4a8cb5e9e177016e7ac6"

[vars]
CORS_ORIGINS = "https://demo1.zenfishlog.cc.cd"

# ============================================
# Secrets（通过 wrangler secret put 设置）
# - JWT_SECRET_KEY
# - ENCRYPTION_KEY
# - ADMIN_INITIAL_PASSWORD
# ============================================
